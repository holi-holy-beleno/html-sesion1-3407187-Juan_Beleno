<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!--menu responsive-->
    <!--dimensionamiento-->
    <div class="main-header">
        <!--container de menu: flex -->
        <div class="main-header__container">

            <!--logo-->
            <div class="main-header__logo">
                Mis Eventos
            </div>

            <!--boton hamburguesa-->
            <button class="main-header__toggle" id="menu-toggle">
                 <div class="main-header__bar"></div>
                 <div class="main-header__bar"></div>
                 <div class="main-header__bar"></div>
            </button>

            <!--barra de navegacion-->
            <nav class="main-nav" id="main-nav">
                <ul class="main-nav__list">
                    <li class="main-nav__item">
                        <a href="#" class="main-nav__link">Buscar</a>
                    </li>
                    <li class="main-nav__item">
                        <a href="#" class="main-nav__link">Ayuda</a>
                    </li>
                    <li class="main-nav__item">
                        <a href="#" class="main-nav__link">Configuracion</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>

    <!--calendario-->
    <div class="container">
        <!-- NUEVO: cabecera del mes con botones de navegacion anterior/siguiente -->
        <div class="month-header">
            <button class="month-nav" id="prev-month">&#8249;</button>
            <div class="month" id="current-month">June 2026</div>
            <button class="month-nav" id="next-month">&#8250;</button>
        </div>

        <div class="days">
            <div class="days__item">Mon</div>
            <div class="days__item">Tue</div>
            <div class="days__item">Wed</div>
            <div class="days__item">Thu</div>
            <div class="days__item">Fri</div>
            <div class="days__item">Sat</div>
            <div class="days__item">Sun</div>
        </div>
        <!-- Los días se generan con JavaScript -->
        <div class="schedule" id="calendar-grid"></div>
    </div>

    <!-- Modal para agregar eventos -->
    <div class="modal" id="event-modal">
        <div class="modal__content">
            <div class="modal__header">
                <h2 id="modal-title">Agregar Evento</h2>
                <button class="modal__close" id="close-modal">&times;</button>
            </div>
            <form id="event-form">
                <div class="form__group">
                    <label for="event-name">Nombre del Evento *</label>
                    <input type="text" id="event-name" placeholder="Ej: Reunión de trabajo" required>
                </div>
                <div class="form__group">
                    <label for="event-description">Descripción</label>
                    <textarea id="event-description" placeholder="Describe tu evento..." rows="3"></textarea>
                </div>
                <div class="form__group">
                    <label for="event-time">Hora</label>
                    <input type="time" id="event-time">
                </div>
                <div class="form__group">
                    <label for="event-icon">Ícono</label>
                    <select id="event-icon">
                        <option value="📝">📝 Reunión</option>
                        <option value="🎂">🎂 Cumpleaños</option>
                        <option value="💼">💼 Trabajo</option>
                        <option value="🏥">🏥 Médico</option>
                        <option value="✈️">✈️ Viaje</option>
                        <option value="🎓">🎓 Estudio</option>
                        <option value="🎉">🎉 Fiesta</option>
                        <option value="🏋️">🏋️ Ejercicio</option>
                        <option value="🍽️">🍽️ Comida</option>
                        <option value="🎵">🎵 Música</option>
                        <option value="📚">📚 Lectura</option>
                        <option value="💡">💡 Idea</option>
                    </select>
                </div>
                <input type="hidden" id="event-day">
                <button type="submit" class="form__submit">Agregar Evento ✅</button>
            </form>
        </div>
    </div>

    <script>
        // =============================================
        // BLOQUE 
        // =============================================
        const menuToggle = document.getElementById("menu-toggle")
        console.log(menuToggle)
        const mainNav = document.getElementById("main-nav")
        console.log(mainNav)

        //evento de click del boton//
        menuToggle.addEventListener('click', function(){
            console.log("click funciono")
            //estilos de main-nav
            mainNav.classList.toggle('main-nav__open')
        })

        // =============================================
        // NUEVO: Funcionalidad completa del calendario
        // =============================================

        const calendarGrid    = document.getElementById("calendar-grid");
        const currentMonthEl  = document.getElementById("current-month");
        const modal           = document.getElementById("event-modal");
        const closeModalBtn   = document.getElementById("close-modal");
        const eventForm       = document.getElementById("event-form");
        const eventNameEl     = document.getElementById("event-name");
        const eventDescEl     = document.getElementById("event-description");
        const eventTimeEl     = document.getElementById("event-time");
        const eventIconEl     = document.getElementById("event-icon");
        const eventDayEl      = document.getElementById("event-day");
        const prevMonthBtn    = document.getElementById("prev-month");
        const nextMonthBtn    = document.getElementById("next-month");

        // Fecha de hoy real
        const today = new Date();

        // Fecha que se está mostrando actualmente (empieza en el mes real)
        let currentDate = new Date(today.getFullYear(), today.getMonth(), 1);

        // Almacén de eventos
        let events = {};

        // Nombres de meses y días en inglés (igual que la imagen original)
        const monthNames = [
            'January','February','March','April','May','June',
            'July','August','September','October','November','December'
        ];

        // Cargar eventos del localStorage
        function loadEvents() {
            const saved = localStorage.getItem('calendarEvents');
            if (saved) events = JSON.parse(saved);
        }

        // Guardar eventos en localStorage
        function saveEvents() {
            localStorage.setItem('calendarEvents', JSON.stringify(events));
        }

        // Renderizar el calendario
        function renderCalendar() {
            const year  = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // Actualizar título: "June 2026"
            currentMonthEl.textContent = `${monthNames[month]} ${year}`;

            const firstDay      = new Date(year, month, 1).getDay();
            const daysInMonth   = new Date(year, month + 1, 0).getDate();
            const prevDaysTotal = new Date(year, month, 0).getDate();

            // Desplazamiento: semana empieza el lunes
            let startOffset = firstDay === 0 ? 6 : firstDay - 1;

            let html = '';

            // Días del mes anterior (atenuados)
            for (let i = startOffset - 1; i >= 0; i--) {
                const day = prevDaysTotal - i;
                html += `<div class="schedule__days schedule__days--other-month">
                            <div class="schedule__day-number">${day}</div>
                         </div>`;
            }

            // Días del mes actual
            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const dayEvents = events[dateKey] || [];

                // Detectar si es hoy
                const isToday = (
                    day === today.getDate() &&
                    month === today.getMonth() &&
                    year === today.getFullYear()
                );

                // Detectar fin de semana (sábado/domingo en posición de grilla)
                const dayOfWeek = new Date(year, month, day).getDay(); // 0=dom, 6=sab
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);

                html += `
                    <div class="schedule__days${isToday ? ' schedule__days--today' : ''}${isWeekend ? ' schedule__days--weekend' : ''}"
                         data-day="${day}" data-date="${dateKey}">
                        <div class="schedule__day-number">${day}</div>
                        <div class="schedule__events">
                            ${dayEvents.map(ev => `
                                <div class="event-item" style="border-color:${ev.color}; background-color:${ev.color}15">
                                    <span class="event-icon">${ev.icon}</span>
                                    <span class="event-name">${ev.name}</span>
                                    ${ev.time ? `<span class="event-time">${ev.time}</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            // Completar última fila con días del mes siguiente
            const totalCells = startOffset + daysInMonth;
            const remaining  = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let day = 1; day <= remaining; day++) {
                html += `<div class="schedule__days schedule__days--other-month">
                            <div class="schedule__day-number">${day}</div>
                         </div>`;
            }

            calendarGrid.innerHTML = html;

            // Click en cada día del mes actual para abrir modal
            document.querySelectorAll('.schedule__days:not(.schedule__days--other-month)').forEach(el => {
                el.addEventListener('click', function() {
                    openModal(this.dataset.day, this.dataset.date);
                });
            });
        }

        // Navegación entre meses
        prevMonthBtn.addEventListener('click', function() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        nextMonthBtn.addEventListener('click', function() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        // Abrir modal
        function openModal(day, date) {
            eventDayEl.value = date;
            eventForm.reset();
            eventDayEl.value = date;
            document.getElementById('modal-title').textContent = `Agregar Evento — ${date}`;

            const now = new Date();
            eventTimeEl.value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            modal.style.display = 'flex';
            setTimeout(() => eventNameEl.focus(), 100);
        }

        // Cerrar modal
        function closeModalHandler() {
            modal.style.display = 'none';
            eventForm.reset();
        }

        // Agregar evento
        function addEvent(e) {
            e.preventDefault();

            const date  = eventDayEl.value;
            const name  = eventNameEl.value.trim();
            const desc  = eventDescEl.value.trim();
            const time  = eventTimeEl.value;
            const icon  = eventIconEl.value;

            if (!name) { alert('Por favor ingresa un nombre para el evento'); return; }

            const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#FF8A5C','#A8E6CF'];
            const color  = colors[Math.floor(Math.random() * colors.length)];

            if (!events[date]) events[date] = [];
            events[date].push({ id: Date.now(), name, description: desc, time, icon, color });

            saveEvents();
            renderCalendar();
            closeModalHandler();
        }

        closeModalBtn.addEventListener('click', closeModalHandler);
        window.addEventListener('click', e => { if (e.target === modal) closeModalHandler(); });
        eventForm.addEventListener('submit', addEvent);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalHandler(); });

        // Inicializar
        loadEvents();
        renderCalendar();

        console.log('Calendario de Eventos cargado correctamente');
    </script>

</body>
</html>
