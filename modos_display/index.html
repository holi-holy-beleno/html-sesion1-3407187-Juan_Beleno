<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidencia 1</title>
    <link rel="icon" type="image/png" href=".../images/cube_394.png">
    <style>
        .titulo {
            color: white;
            font-size: 15px;
            background-color: black;
            letter-spacing: 3px;
            text-align: center;
            animation-trigger: initial;
            transition: all 2s ease;
        }

        .titulo:hover {
            color: black;
            background-color: white;
            font-size: 15px;
            letter-spacing: 5px;
            cursor: grab;
        }

        .menu{
            display: inline;
            background-color: cadetblue;
            color: beige;
        }

        .menu_block{
            display: block;
            background-color: cadetblue;
            color: beige;
            width: 500px;
            height: 100px;
        }
    </style>
</head>
<body>
    <h1 class="titulo">Elementos Inline</h1>
    <div class="menu">Productos</div>
    <div class="menu">Servicios</div>
    <div class="menu">Contacto</div>
<hr>
    <h1 class="titulo">Elementos block</h1>
    <div class="menu_block">Productos</div>
    <div class="menu_block">Servicios</div>
    <div class="menu_block">Contacto</div>
</body>
</html>
