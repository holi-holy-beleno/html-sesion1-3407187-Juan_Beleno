<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>
    <link rel="stylesheet" href="evidencia.css">
</head>
<body>
    <h1 class="titulo">
        Estos son nuestros productos 👌
    </h1>
    <div class="catalogo_container">
        <figure class="catalogo_card">
            <img class="catalogo_img" src="imagenes/aquamarina.webp" alt="marisa cfff">
            <h3 class="titulop">Peluche de bruja</h3>
            <p class="precio">$10.000</p>
        </figure>
        <figure class="catalogo_card">
            <img class="catalogo_img" src="imagenes/Cirnofumo.webp" alt="Cirno">
            <h3 class="titulop">Peluche de Maga gelida</h3>
            <p class="precio">$5.000</p>
        </figure>
        <figure class="catalogo_card">
            <img class="catalogo_img" src="imagenes/hombre de 10 horas de ráfaga.gif" alt="hombre rafaga">
            <h3 class="titulop">Saludo del hombre de las 10 de rafaga</h3>
            <p class="precio">$50.000</p>
        </figure>
        <figure class="catalogo_card">
            <img class="catalogo_img" src="imagenes/luchepe.webp" alt="peluchehe">
            <h3 class="titulop">Peluche fantasmagorico</h3>
            <p class="precio">$9.000</p>
        </figure>
        <figure class="catalogo_card">
            <img class="catalogo_img" src="imagenes/perro_guaton.png" alt="goldo">
            <h3 class="titulop">Perrito waton</h3>
            <p class="precio">$15.000</p>
        </figure>
        <figure class="catalogo_card">
            <img class="catalogo_img" src="imagenes/reimu.jpg" alt="rimu">
            <h3 class="titulop">Peluche de maga roja</h3>
            <p class="precio">$15.000</p>
        </figure>
    
    </div>
</body>
</html>
